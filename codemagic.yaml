workflows:
  android-build:
    name: Android Debug APK
    instance_type: mac_mini_m2
    max_build_duration: 15
    
    environment:
      groups:
        - android
      vars:
        JAVA_HOME: /usr/lib/jvm/temurin-17-hotspot-amd64
    
    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          
      - name: Build APK
        script: |
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-daemon --stacktrace
          
    artifacts:
      - app/build/outputs/apk/debug/*.apk
    
    publishing:
      email:
        recipients:
          - 2823893928@qq.com
        notify:
          success: true
          failure: true
