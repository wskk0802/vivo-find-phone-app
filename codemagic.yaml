workflows:
  build:
    name: Build APK
    instance_type: mac_mini_m2
    max_build_duration: 30
    
    environment:
      groups:
        - android
    
    scripts:
      - name: Build APK
        script: |
          cd $CM_BUILD_DIR
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          
    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk
