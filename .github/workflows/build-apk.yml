name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK + Build APK
        run: |
          set -x  # 开启命令回显
          
          echo "===== STEP 1: 安装Android SDK ====="
          export ANDROID_HOME=$HOME/android-sdk
          mkdir -p $ANDROID_HOME/cmdline-tools
          
          # 下载命令行工具
          wget -q "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -O /tmp/cmdtools.zip
          if [ ! -s /tmp/cmdtools.zip ]; then
            echo "ERROR: cmdtools下载失败"
            ls -la /tmp/cmdtools.zip
            exit 1
          fi
          
          unzip -q /tmp/cmdtools.zip -d $ANDROID_HOME/cmdline-tools/
          mkdir -p $ANDROID_HOME/cmdline-tools/latest
          mv $ANDROID_HOME/cmdline-tools/cmdline-tools/* $ANDROID_HOME/cmdline-tools/latest/ 2>/dev/null || true
          
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
          
          echo "===== STEP 2: 接受许可证 ====="
          yes | sdkmanager --licenses || true
          
          echo "===== STEP 3: 安装SDK组件 ====="
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"
          
          echo "===== STEP 4: 验证SDK ====="
          ls $ANDROID_HOME/platforms/
          ls $ANDROID_HOME/build-tools/
          
          echo "===== STEP 5: 安装Gradle ====="
          wget -q "https://services.gradle.org/distributions/gradle-8.5-bin.zip" -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/
          export PATH=/opt/gradle-8.5/bin:$PATH
          gradle --version
          
          echo "===== STEP 6: 创建配置文件 ====="
          # local.properties
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          
          # gradle.properties
          mkdir -p ~/.gradle
          cat > ~/.gradle/gradle.properties << 'GP'
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          org.gradle.daemon=false
          android.useAndroidX=true
          GP
          
          echo "===== STEP 7: 开始构建 ====="
          cd $GITHUB_WORKSPACE
          
          # 确保gradlew有执行权限
          chmod +x gradlew 2>/dev/null || true
          
          # 尝试用gradle命令直接构建
          gradle clean assembleDebug --no-daemon --stacktrace 2>&1
          
          echo "===== STEP 8: 检查输出 ====="
          find . -name "*.apk" -exec ls -la {} \;
          ls -la app/build/outputs/apk/debug/ 2>/dev/null
          
          # 如果成功，复制到output
          mkdir -p output
          cp app/build/outputs/apk/debug/*.apk output/ 2>/dev/null || echo "WARNING: 没有找到APK文件"
          
          echo "===== DONE ====="
        env:
          ANDROID_HOME: /home/runner/android-sdk

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vivo-find-phone-apk
          path: output/*.apk
          retention-days: 30
      
      - name: Show all files on failure
        if: failure()
        run: |
          echo "===== COMPLETE DIRECTORY LISTING ====="
          find . -type f -not -path "*/.git/*" -not -path "*/build/*" | sort
          echo ""
          echo "===== BUILD DIRECTORY ====="
          ls -laR app/build/ 2>/dev/null | head -50
          echo ""
          echo "===== ANDROID HOME ====="
          ls -la $ANDROID_HOME/
          ls -la $ANDROID_HOME/platforms/ 2>/dev/null
          ls -la $ANDROID_HOME/build-tools/ 2>/dev/null
          echo ""
          echo "===== GRADLE CACHE ====="
          ls -la ~/.gradle/caches/modules-2/files-2.1/ 2>/dev/null | head -20
          echo ""
          echo "===== Any APK anywhere? ====="
          find / -name "*.apk" 2>/dev/null
