name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/
          echo "/opt/gradle-8.5/bin" >> $GITHUB_PATH
          gradle --version

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: '34.0.0'

      - name: Show environment
        run: |
          echo "=== Java ==="
          java -version
          echo "=== Gradle ==="
          gradle --version
          echo "=== Android SDK ==="
          ls $ANDROID_HOME/
          echo "=== Project structure ==="
          ls -la
          cat settings.gradle
          echo "=== app/build.gradle ==="
          cat app/build.gradle

      - name: Build Debug APK with verbose output
        run: gradle assembleDebug --no-daemon --info --stacktrace 2>&1 | tail -100
        continue-on-error: true

      - name: Show build output on failure
        if: failure()
        run: |
          echo "=== build directory ==="
          ls -la app/build/ 2>/dev/null || echo "no build dir"
          echo "=== gradle error logs ==="
          find . -name "*.log" -path "*/build/*" 2>/dev/null | head -5
          echo "=== check if APK was created anyway ==="
          find . -name "*.apk" 2>/dev/null
          echo "=== app/src/main ==="
          ls -la app/src/main/
          echo "=== AndroidManifest ==="
          cat app/src/main/AndroidManifest.xml
