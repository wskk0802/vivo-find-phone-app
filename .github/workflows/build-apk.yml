name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/
          echo "export PATH=/opt/gradle-8.5/bin:$PATH" >> $GITHUB_ENV
          echo "/opt/gradle-8.5/bin" >> $GITHUB_PATH
          /opt/gradle-8.5/bin/gradle --version

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: '34.0.0'

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: List output files
        run: |
          echo "=== 检查APK输出 ==="
          find . -name "*.apk" 2>/dev/null
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "debug目录不存在"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vivo-find-phone-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
