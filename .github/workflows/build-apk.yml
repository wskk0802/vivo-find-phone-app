name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install JDK + Android SDK + Gradle
        run: |
          set -ex
          
          # === JDK 17 ===
          sudo apt-get update -qq
          sudo apt-get install -y -qq openjdk-17-jdk-headless wget unzip
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$JAVA_HOME/bin:$PATH
          java -version
          
          # === Android SDK ===
          export ANDROID_HOME=$HOME/android-sdk
          mkdir -p $ANDROID_HOME/cmdline-tools
          wget -q "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -O /tmp/ct.zip
          unzip -q /tmp/ct.zip -d $ANDROID_HOME/cmdline-tools/
          mkdir -p $ANDROID_HOME/cmdline-tools/latest
          mv $ANDROID_HOME/cmdline-tools/cmdline-tools/* $ANDROID_HOME/cmdline-tools/latest/
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
          
          yes | sdkmanager --licenses 2>&1 | tail -3
          sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -3
          
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV
          
          # === Gradle ===
          wget -q "https://services.gradle.org/distributions/gradle-8.5-bin.zip" -O /tmp/g.zip
          unzip -q /tmp/g.zip -d /opt/
          export GRADLE_HOME=/opt/gradle-8.5
          export PATH=$GRADLE_HOME/bin:$PATH
          echo "$GRADLE_HOME/bin" >> $GITHUB_PATH
          gradle --version
          
          # === Configure ===
          cd $GITHUB_WORKSPACE
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-Xmx1536m -Dfile.encoding=UTF-8" > ~/.gradle/gradle.properties
          echo "android.useAndroidX=true" >> ~/.gradle/gradle.properties
          echo "android.enableJetifier=true" >> ~/.gradle/gradle.properties
          echo "org.gradle.daemon=false" >> ~/.gradle/gradle.properties
          
          # === Build ===
          echo "=== Starting build ==="
          gradle clean assembleDebug --no-daemon --console=plain
          
          echo "=== APK files ==="
          ls -la app/build/outputs/apk/debug/
          
          # 确认APK存在
          if [ ! -f app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "ERROR: app-debug.apk not found!"
            find . -name "*.apk" 2>/dev/null
            exit 1
          fi
          
          echo "=== Build SUCCESS ==="

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vivo-find-phone-app
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
      
      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            app/build/outputs/
            /home/runner/.gradle/caches/
          retention-days: 7
        continue-on-error: true
