name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build APK using Docker
        run: |
          set -e
          
          # 拉取预配置的Android构建镜像
          docker pull reactnativedocker/react-native-android:latest 2>/dev/null || \
          docker pull androidsdk/android-30:latest 2>/dev/null || \
          docker pull mingc/android-build-box:latest
          
          # 创建输出目录
          mkdir -p $GITHUB_WORKSPACE/output
          
          # 用Docker构建
          docker run --rm \
            -v $GITHUB_WORKSPACE:/workspace \
            -w /workspace \
            --entrypoint="" \
            mingc/android-build-box:latest \
            bash -c "
              cd /workspace
              # 接受许可证
              yes | sdkmanager --licenses 2>/dev/null || true
              # 安装SDK
              sdkmanager 'platforms;android-34' 'build-tools;34.0.0' 2>/dev/null || true
              # 设置环境
              export ANDROID_HOME=\$ANDROID_HOME
              echo 'sdk.dir='\$ANDROID_HOME > local.properties
              # 构建
              chmod +x gradlew 2>/dev/null || true
              gradle assembleDebug --no-daemon 2>&1 || ./gradlew assembleDebug --no-daemon 2>&1
              # 复制APK
              cp app/build/outputs/apk/debug/*.apk /workspace/output/ 2>/dev/null || echo 'APK not found'
            "
          
          echo "=== Output ==="
          ls -la output/
        continue-on-error: true

      - name: Fallback - manual build if Docker failed
        if: failure()
        run: |
          set -e
          echo "Docker方式失败，尝试手动构建..."
          
          # 安装JDK
          sudo apt-get update -qq
          sudo apt-get install -y -qq wget unzip 2>/dev/null || true
          
          # Android SDK
          export ANDROID_HOME=$HOME/sdk
          mkdir -p $ANDROID_HOME/cmdline-tools
          wget -q "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -O /tmp/ct.zip
          unzip -q /tmp/ct.zip -d $ANDROID_HOME/cmdline-tools/
          mkdir -p $ANDROID_HOME/cmdline-tools/latest
          mv $ANDROID_HOME/cmdline-tools/cmdline-tools/* $ANDROID_HOME/cmdline-tools/latest/
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
          
          # 许可证和组件
          yes | sdkmanager --licenses 2>&1 | tail -3
          sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -5
          
          # Gradle
          wget -q "https://services.gradle.org/distributions/gradle-8.5-bin.zip" -O /tmp/g.zip
          unzip -q /tmp/g.zip -d /opt/
          export PATH=/opt/gradle-8.5/bin:$PATH
          
          # 配置
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-Xmx1536m" > ~/.gradle/gradle.properties
          echo "android.useAndroidX=true" >> ~/.gradle/gradle.properties
          
          # 构建
          cd $GITHUB_WORKSPACE
          gradle clean assembleDebug --no-daemon 2>&1
          
          mkdir -p output
          cp app/build/outputs/apk/debug/*.apk output/

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vivo-find-phone-apk
          path: output/*.apk
          retention-days: 30
        continue-on-error: true
      
      - name: Emergency upload
        if: always()
        run: |
          # 如果正常output为空，尝试找任何APK
          if [ ! -f output/*.apk ] 2>/dev/null; then
            echo "搜索所有APK文件..."
            find . -name "*.apk" 2>/dev/null | while read f; do
              echo "找到: $f"
              mkdir -p output
              cp "$f" output/
            done
          fi
          
          echo "最终output目录:"
          ls -la output/ 2>/dev/null || echo "output目录为空"
          
          # 即使没有APK也上传日志
          if [ ! -f output/*.apk ] 2>/dev/null; then
            echo "构建失败，收集诊断信息..."
            {
              echo "=== Build Environment ==="
              echo "Date: $(date)"
              echo "Runner OS: $RUNNER_OS"
              echo "Java: $(java -version 2>&1)"
              echo ""
              echo "=== Project Files ==="
              find . -maxdepth 3 -type f -not -path "*/.git/*" -not -path "*/build/*" | sort
              echo ""
              echo "=== Android SDK ==="
              ls $ANDROID_HOME/ 2>/dev/null
              ls $ANDROID_HOME/platforms/ 2>/dev/null
              echo ""
              echo "=== Build Output ==="
              ls -laR app/build/ 2>/dev/null | head -30
            } > output/build-diagnostic.txt
          fi
          
          ls -la output/
