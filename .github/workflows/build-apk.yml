name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: '34.0.0'

      - name: Build APK with Gradle
        run: |
          # 设置环境变量
          export ANDROID_HOME=$ANDROID_HOME
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          
          # Gradle配置
          mkdir -p ~/.gradle
          cat > ~/.gradle/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          org.gradle.daemon=false
          org.gradle.parallel=false
          android.useAndroidX=true
          android.enableJetifier=true
          EOF
          
          # 验证SDK
          echo "=== SDK Info ==="
          ls $ANDROID_HOME/platforms/
          ls $ANDROID_HOME/build-tools/
          
          # 下载Gradle
          echo "=== Installing Gradle ==="
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/
          export GRADLE_HOME=/opt/gradle-8.5
          export PATH=$GRADLE_HOME/bin:$PATH
          gradle --version
          
          # 构建
          echo "=== Building APK ==="
          cd $GITHUB_WORKSPACE
          gradle clean assembleDebug --no-daemon --console=plain --stacktrace
          
          echo "=== Build Output ==="
          find . -name "*.apk" -exec ls -la {} \;
          ls -la app/build/outputs/apk/debug/
          
          # 复制到已知位置
          mkdir -p /tmp/apk-output
          cp app/build/outputs/apk/debug/*.apk /tmp/apk-output/ 2>/dev/null || {
            echo "ERROR: No APK found!"
            echo "=== Full build dir ==="
            find app/build -type f | head -30
            exit 1
          }
          
          echo "=== APK ready ==="
          ls -la /tmp/apk-output/
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vivo-find-phone-app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
        if: success()
      
      - name: Upload diagnostic on failure
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostic
          path: |
            app/build/outputs/
            ~/.gradle/caches/
          retention-days: 7
        if: failure()
