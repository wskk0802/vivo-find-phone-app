name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: '34.0.0'

      - name: Prepare environment
        run: |
          # 确保ANDROID_HOME正确
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          
          # 创建gradle.properties
          mkdir -p ~/.gradle
          cat > ~/.gradle/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          org.gradle.parallel=true
          org.gradle.daemon=false
          android.useAndroidX=true
          android.enableJetifier=true
          EOF
          
          echo "=== Environment ==="
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls $ANDROID_HOME/
          echo ""
          echo "=== Java ==="
          java -version
          echo ""
          echo "=== local.properties ==="
          cat local.properties

      - name: Download Gradle and build
        run: |
          # 手动下载安装Gradle
          cd /tmp
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          export GRADLE_HOME=/tmp/gradle-8.5
          export PATH=$GRADLE_HOME/bin:$PATH
          
          cd $GITHUB_WORKSPACE
          
          # 使用gradle命令构建
          gradle clean assembleDebug --no-daemon --stacktrace 2>&1
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vivo-find-phone-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
      
      - name: Debug on failure
        if: failure()
        run: |
          echo "===== FULL DEBUG INFO ====="
          echo ""
          echo "--- Directory structure ---"
          find . -maxdepth 3 -type f -not -path "*/.git/*" | head -30
          echo ""
          echo "--- Android SDK ---"
          ls $ANDROID_HOME/
          ls $ANDROID_HOME/platforms/ 2>/dev/null || echo "no platforms"
          ls $ANDROID_HOME/build-tools/ 2>/dev/null || echo "no build-tools"
          echo ""
          echo "--- Gradle version ---"
          gradle --version 2>/dev/null || echo "gradle not found"
          echo ""
          echo "--- app/build contents ---"
          ls -la app/build/ 2>/dev/null
          ls -la app/build/outputs/ 2>/dev/null
          ls -la app/build/outputs/apk/ 2>/dev/null
          echo ""
          echo "--- Search for any APK ---"
          find . -name "*.apk" 2>/dev/null
          echo ""
          echo "--- gradle build cache ---"
          ls -la ~/.gradle/caches/ 2>/dev/null | head -10
          echo ""
          echo "--- Build logs ---"
          find . -name "*.log" -path "*/build/*" 2>/dev/null | head -5
          find /tmp -name "*.log" 2>/dev/null | head -5
